<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" role="img" aria-label="Subtle lotus and mandala pattern">
  <defs>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#D63384" opacity="0.26"/>
      <circle cx="28" cy="28" r="1.5" fill="#7C3AED" opacity="0.22"/>
    </pattern>
    <g id="petal">
      <path d="M450 120C486 190 486 260 450 330C414 260 414 190 450 120Z" fill="none" stroke="#D63384" stroke-width="5" opacity="0.22"/>
    </g>
  </defs>
  <rect width="900" height="900" fill="url(#dots)"/>
  <g transform="translate(0 0)">
    <circle cx="450" cy="450" r="248" fill="none" stroke="#D63384" stroke-width="4" opacity="0.12"/>
    <circle cx="450" cy="450" r="178" fill="none" stroke="#7C3AED" stroke-width="4" opacity="0.1"/>
    <use href="#petal"/>
    <use href="#petal" transform="rotate(30 450 450)"/>
    <use href="#petal" transform="rotate(60 450 450)"/>
    <use href="#petal" transform="rotate(90 450 450)"/>
    <use href="#petal" transform="rotate(120 450 450)"/>
    <use href="#petal" transform="rotate(150 450 450)"/>
    <use href="#petal" transform="rotate(180 450 450)"/>
    <use href="#petal" transform="rotate(210 450 450)"/>
    <use href="#petal" transform="rotate(240 450 450)"/>
    <use href="#petal" transform="rotate(270 450 450)"/>
    <use href="#petal" transform="rotate(300 450 450)"/>
    <use href="#petal" transform="rotate(330 450 450)"/>
  </g>
</svg>
